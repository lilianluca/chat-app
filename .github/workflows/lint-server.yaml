name: Lint

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/lint-server.yaml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/lint-server.yaml"

jobs:
  lint:
    name: Lint Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Check Formatting
        run: uv run ruff check .

      - name: Check Linting
        run: uv run ruff check .
